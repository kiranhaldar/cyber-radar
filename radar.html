<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔴 CYBER RADAR | ACTIVE SURVEILLANCE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: monospace;
        }
        .radar-panel {
            text-align: center;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #000000;
            border-radius: 50%;
            box-shadow: 0 0 80px #00ff41, inset 0 0 20px #00ff41;
        }
        .stats-panel {
            color: #00ff41;
            margin-top: 30px;
            background: #0a0a0a;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid #00ff41;
            width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
        .close-button {
            background: #00ff41;
            color: black;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 50px;
        }
        .close-button:hover {
            background: #ff3300;
            color: white;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="radar-panel">
        <div class="radar-header">🛸 CYBER THREAT RADAR 🛸</div>
        <canvas id="radarCanvas" width="600" height="600"></canvas>
        <div class="stats-panel">
            <div>🎯 ACTIVE THREATS: <span id="threatCount">0</span></div>
            <div>⚠️ CURRENT THREAT LEVEL: <span id="threatLevelDynamic">🟢 LOW</span></div>
            <div>📡 LAST DETECTED: <span id="lastAttack">--</span></div>
            <div>📜 ATTACK LOGS:</div>
            <div id="attackLogs" style="font-size: 12px; max-height: 150px; overflow-y: auto;">--</div>
        </div>
        <button class="close-button" onclick="window.location.href='index.html'">⛔ CLOSE RADAR ⛔</button>
    </div>
    <script src="radar.js"></script>
</body>
</html>
